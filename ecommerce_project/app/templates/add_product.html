{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Add Product</h2>

    <form onsubmit="submitProduct(event)" enctype="multipart/form-data">
        <input type="text" id="name" placeholder="Product Name" required>
        <textarea id="description" placeholder="Description" required></textarea>
        <input type="number" id="price" placeholder="Price" required>
        <input type="number" id="stock" placeholder="Stock" required>
        
        <label for="image_file">Product Image:</label>
        <input type="file" id="image_file" accept="image/*">
        
        <input type="text" id="image_url" placeholder="OR Image URL (Optional)">

        <label for="category_id">Category:</label>
        <select id="category_id" required>
            {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
        </select>

        <label for="brand_id">Brand:</label>
        <select id="brand_id" required>
            {% for brand in brands %}
                <option value="{{ brand.id }}">{{ brand.name }}</option>
            {% endfor %}
        </select>

        <button type="submit">Save Product</button>
    </form>
</div>

<script>
async function submitProduct(e) {
    e.preventDefault();

    const formData = new FormData();
    formData.append("name", document.getElementById("name").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("price", document.getElementById("price").value);
    formData.append("stock", document.getElementById("stock").value);
    formData.append("category_id", document.getElementById("category_id").value);
    formData.append("brand_id", document.getElementById("brand_id").value);
    
    const imageUrl = document.getElementById("image_url").value;
    if (imageUrl) formData.append("image_url", imageUrl);
    
    const imageFile = document.getElementById("image_file").files[0];
    if (imageFile) formData.append("image_file", imageFile);

    const res = await fetch("/api/products", {
        method: "POST",
        body: formData
    });

    if (res.ok) {
        alert("Product Added");
        window.location.href = "/";
    } else {
        alert("Error adding product");
    }
}
</script>
{% endblock %}
